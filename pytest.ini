[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Show short summary of all failures at the end
addopts =
    -v
    --tb=short
    --strict-markers

# Custom markers
markers =
    slow: marks tests as slow (deselect with -m "not slow")
    integration: marks tests that require external services (LLM server, etc.)
    llm: marks tests that make real LLM calls

# Minimum Python version guard
minversion = 7.0
